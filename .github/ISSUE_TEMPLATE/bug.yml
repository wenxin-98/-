name: Bug 报告
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 清晰地描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      value: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: "`pm2 logs unified-panel --lines 50` 或浏览器控制台"
      render: shell
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "Ubuntu 22.04 / CentOS 7 / Debian 12"
  - type: input
    id: versions
    attributes:
      label: 版本信息
      placeholder: "Node 20.x, GOST 3.0.0-rc10, 3X-UI 2.x"
